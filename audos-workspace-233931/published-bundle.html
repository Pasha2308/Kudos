      /* Hero legibility floor (deterministic): guarantees a dark veil over the
         hero background media and white hero copy no matter what the EmailGate
         customization LLM emits. Anchored on BOTH the hero id and the landing
         root's first section, because in practice the LLM sometimes drops
         id="hero" while keeping the .eg-root wrapper (verified on live staging
         variants), and sometimes keeps id="hero" without .eg-root. Uses
         !important so it beats inline brand-color text, and only lifts copy /
         interactive elements — never the absolutely-positioned <video>/<img> —
         so it can't fight the layout.
         ponytail: two structural anchors cover every gate variant observed; a
         gate that renames BOTH the id and the wrapper would still slip through.
         Upgrade path: enforce id="hero" in the gate source at splice /
         customization time so a single anchor is always present. */
      #hero,
      .eg-root > section:first-of-type { position: relative; }
      #hero::after,
      .eg-root > section:first-of-type::after {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(2, 6, 23, 0.1);
        z-index: 1;
        pointer-events: none;
      }
      #hero h1, #hero h2, #hero p, #hero a, #hero button,
      .eg-root > section:first-of-type h1, .eg-root > section:first-of-type h2,
      .eg-root > section:first-of-type p, .eg-root > section:first-of-type a,
      .eg-root > section:first-of-type button { position: relative; z-index: 2; }
      #hero h1, #hero h2, #hero p,
      .eg-root > section:first-of-type h1, .eg-root > section:first-of-type h2,

            try { sessionStorage.removeItem('__audos_cdn_fallback'); } catch(e) {}
            window.location.replace(u.toString());
          };
          var reload = document.getElementById('__audos_reload_btn');
          if (reload) reload.onclick = function() { window.location.reload(); };
        }

        function hideLoader() {
          if (!loader || loader.classList.contains('hidden')) return;
          loader.classList.add('hidden');
          setTimeout(function() {
            if (loader.parentNode) loader.parentNode.removeChild(loader);
          }, 300);
          try { sessionStorage.removeItem('__audos_cold_retry'); } catch(e) {}
          try { sessionStorage.removeItem('__audos_cdn_fallback'); } catch(e) {}
        }

        // Keep the secondary user-facing loading copy visible while the
        // root still hasn't rendered. Triggers regardless of fatalError.
        setTimeout(function() {
          if (root.children.length === 0) {
            var sec = document.getElementById('space-loader-secondary');
            if (sec) sec.style.display = 'block';
          }
        }, 5000);

        // Use MutationObserver to detect when React renders content. The
        // module script above can render before this script attaches the
        // observer, so check the current DOM first to avoid an 8s loader flash.
        var observer = new MutationObserver(function(mutations) {
          if (root.children.length > 0) {
            hideLoader();
            observer.disconnect();
          }
        });

        if (root.children.length > 0) {
          hideLoader();
          return;
        }
        
        observer.observe(root, { childList: true });
        
        // Fallback: if after 8 seconds the page has no visible content, show recovery.
        // Task #1435: surface the underlying cause via showRecovery(reason, details)
        // so the user sees the actual error, not just an opaque spinner.
        setTimeout(function() {
          var isTopLevel = (window === window.parent);
          var usingCdnFallback = /[?&]cdn=fallback/.test(window.location.search);
          var alreadyTriedCdn = false;
          try { alreadyTriedCdn = !!sessionStorage.getItem('__audos_cdn_fallback'); } catch(e) {}

          // CDN fallback helper: redirect with ?cdn=fallback so the server
          // rewrites the import map from esm.sh to cdn.jsdelivr.net.
          function tryCdnFallback() {
            if (!isTopLevel || usingCdnFallback || alreadyTriedCdn) return false;
            try { sessionStorage.setItem('__audos_cdn_fallback', String(Date.now())); } catch(e) {}
            var u = new URL(window.location.href);
            u.searchParams.set('cdn', 'fallback');
            u.searchParams.set('_cb', String(Date.now()));
            window.location.replace(u.toString());
            return true;
          }

          if (fatalError) {
            if (tryCdnFallback()) return;
            showRecovery('A script error prevented the page from loading.', fatalError);
            return;
          }
          if (root.children.length === 0) {
            var alreadyRetried = false;
            try { alreadyRetried = !!sessionStorage.getItem('__audos_cold_retry'); } catch(e) {}

            if (isTopLevel && !alreadyRetried) {
              // Step 1: cold-start retry (warm the compile cache)
              try { sessionStorage.setItem('__audos_cold_retry', String(Date.now())); } catch(e) {}
              var u = new URL(window.location.href);
              u.searchParams.set('_cb', String(Date.now()));
              window.location.replace(u.toString());
              return;
            }
            // Step 2: CDN fallback — esm.sh may be unreachable
            if (tryCdnFallback()) return;
            showRecovery('The page failed to load. This may be a network or regional issue.', 'No content rendered in the root element after 8s. The application bundle may have failed to evaluate.');
            return;
          }
          // Check if rendered content has any visible height
          var hasVisibleContent = root.offsetHeight > 50 || root.scrollHeight > 50;
          if (!hasVisibleContent) {
            showRecovery('The page loaded but appears empty.', 'The root element has children but no visible height. The component tree may have rendered null.');
            return;
          }
          // Hide loader if still showing
          hideLoader();
        }, 8000);
      })();
    </script>
  </body>
</html>
